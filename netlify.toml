[build]
  publish = "public"

[build.environment]
  NODE_VERSION = "24"

[[redirects]]
  from = "/api/trpc/*"
  to = "https://your-api.railway.app/trpc/:splat"
  status = 200
  force = true
  headers = {X-From = "partyspace-website"}

[[redirects]]
  from = "/.well-known/apple-app-site-association"
  to = "/.well-known/apple-app-site-association"
  status = 200
  headers = {Content-Type = "application/json"}

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
